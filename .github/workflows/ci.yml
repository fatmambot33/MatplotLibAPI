name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run docstring style checks
        run: pydocstyle src


      - name: Set Black target version
        id: black_version
        run: echo "BLACK_TARGET_VERSION=py${PYTHON_VERSION//./}" >> $GITHUB_ENV
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Format check with black
        run: black --check . --target-version=$BLACK_TARGET_VERSION

      - name: Type check with pyright
        run: pyright src

      - name: Run tests with coverage
        run: pytest -q --cov=src --cov-report=term-missing --cov-fail-under=70
